name: Sync Release To Xposed Repo

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "源 tag（留空=自动使用最新 tag）"
        required: false
        default: ""
        type: string
      release_body:
        description: "Release 内容（留空=自动生成：本次与上次 release 之间的 commits）"
        required: false
        default: ""
        type: string
      notify_enabled:
        description: "是否推送到 Bot"
        required: false
        default: true
        type: boolean
      mention_all:
        description: "是否艾特全体成员"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  sync-release:
    runs-on: ubuntu-latest
    outputs:
      notify_githubtag: ${{ steps.notify_tag.outputs.githubtag }}
    env:
      SOURCE_REPO: ${{ github.repository }}
      TARGET_REPO: Xposed-Modules-Repo/com.xiaoai.islandnotify
      INPUT_SOURCE_TAG: ${{ inputs.source_tag }}
      INPUT_RELEASE_BODY: ${{ inputs.release_body }}
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

    steps:
      - name: Validate token
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "RELEASE_TOKEN is missing; cannot publish to target repo."
            exit 1
          fi

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source/target tag and release body
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          mapfile -t tags < <(git tag --sort=-creatordate)

          if [ ${#tags[@]} -eq 0 ]; then
            echo "No tags found in source repository."
            exit 1
          fi

          if [ -n "${INPUT_SOURCE_TAG}" ]; then
            SOURCE_TAG="${INPUT_SOURCE_TAG}"
            if ! git rev-parse "$SOURCE_TAG" >/dev/null 2>&1; then
              echo "source_tag not found: $SOURCE_TAG"
              exit 1
            fi
          else
            SOURCE_TAG="${tags[0]}"
          fi

          PREV_TAG=""
          for i in "${!tags[@]}"; do
            if [ "${tags[$i]}" = "$SOURCE_TAG" ]; then
              j=$((i + 1))
              if [ $j -lt ${#tags[@]} ]; then
                PREV_TAG="${tags[$j]}"
              fi
              break
            fi
          done

          TARGET_TAG="$SOURCE_TAG"
          TARGET_NAME="$SOURCE_TAG"

          if [ -n "${INPUT_RELEASE_BODY}" ]; then
            TARGET_BODY="${INPUT_RELEASE_BODY//$'\r\n'/$'\n'}"
            TARGET_BODY="${TARGET_BODY//$'\r'/$'\n'}"
            # GitHub workflow_dispatch string input is single-line in UI.
            # Allow manual "\n" (and "\r\n") escapes to represent line breaks.
            TARGET_BODY="${TARGET_BODY//\\r\\n/$'\n'}"
            TARGET_BODY="${TARGET_BODY//\\n/$'\n'}"
          else
            if [ -n "$PREV_TAG" ]; then
              TARGET_BODY="$(git log --pretty='- %h %s (%an)' "${PREV_TAG}..${SOURCE_TAG}")"
            else
              TARGET_BODY="$(git log --pretty='- %h %s (%an)' "${SOURCE_TAG}")"
            fi
            if [ -z "$TARGET_BODY" ]; then
              TARGET_BODY="- (no new commits)"
            fi
          fi

          BODY_FILE="$RUNNER_TEMP/target_release_body.md"
          printf '%s\n' "$TARGET_BODY" > "$BODY_FILE"

          {
            echo "source_tag=${SOURCE_TAG}"
            echo "target_tag=${TARGET_TAG}"
            echo "target_name=${TARGET_NAME}"
            echo "body_file=${BODY_FILE}"
          } >> "$GITHUB_OUTPUT"

      - name: Download source release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          SRC_JSON="$(gh api "repos/${SOURCE_REPO}/releases/tags/${{ steps.meta.outputs.source_tag }}")"
          jq -c '.assets[]?' <<<"$SRC_JSON" | while read -r asset; do
            name="$(jq -r '.name // empty' <<<"$asset")"
            url="$(jq -r '.url // empty' <<<"$asset")"
            if [ -z "$name" ] || [ -z "$url" ]; then
              continue
            fi
            echo "Downloading asset: $name"
            gh api -H "Accept: application/octet-stream" "$url" > "release-assets/$name"
          done

          count="$(find release-assets -maxdepth 1 -type f | wc -l | tr -d ' ')"
          echo "Downloaded assets: $count"
          if [ "$count" -eq 0 ]; then
            echo "No assets found in source release."
            exit 1
          fi

      - name: Replace existing target release if exists
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.meta.outputs.target_tag }}'
          if gh release view "$tag" -R "$TARGET_REPO" >/dev/null 2>&1; then
            gh release delete "$tag" -R "$TARGET_REPO" --yes --cleanup-tag
          fi

      - name: Create target release
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.meta.outputs.target_tag }}'
          name='${{ steps.meta.outputs.target_name }}'
          body_file='${{ steps.meta.outputs.body_file }}'

          gh release create "$tag" \
            -R "$TARGET_REPO" \
            --title "$name" \
            --notes-file "$body_file"

      - name: Upload assets to target release
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.meta.outputs.target_tag }}'
          gh release upload "$tag" release-assets/* -R "$TARGET_REPO" --clobber

      - name: Build notify githubtag
        id: notify_tag
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.meta.outputs.target_tag }}'
          echo "githubtag=https://github.com/${TARGET_REPO}/releases/tag/${tag}-${tag}" >> "$GITHUB_OUTPUT"

      - name: Summary
        shell: bash
        run: |
          echo "Synced ${SOURCE_REPO}@${{ steps.meta.outputs.source_tag }} -> ${TARGET_REPO}@${{ steps.meta.outputs.target_tag }}"

  notify-bot:
    needs: sync-release
    uses: ./.github/workflows/notify-bot-update.yml
    with:
      githubtag: ${{ needs.sync-release.outputs.notify_githubtag }}
      notify_enabled: ${{ inputs.notify_enabled }}
      mention_all: ${{ inputs.mention_all }}
    secrets: inherit
