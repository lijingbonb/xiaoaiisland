name: Release Build & Publish

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "version.properties"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare signing files
        shell: bash
        run: |
          mkdir -p build/config build/signing
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > build/signing/release.jks
          cat > build/config/signing.properties <<EOF
          storeFile=${GITHUB_WORKSPACE}/build/signing/release.jks
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Read commit message
        id: commit
        shell: bash
        run: |
          MSG='${{ github.event.head_commit.message }}'
          if [ -z "$MSG" ] || [ "$MSG" = "null" ]; then
            MSG="$(git log -1 --pretty=%B)"
          fi
          {
            echo "message<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Read release version
        id: version
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          candidates = [
              Path("build/release/output-metadata.json"),
              Path("app/build/outputs/apk/release/output-metadata.json"),
          ]
          if not any(p.exists() for p in candidates):
              candidates = list(Path(".").rglob("output-metadata.json"))

          target = None
          for p in candidates:
              s = str(p).lower().replace("\\", "/")
              if "release" in s and ("build/release" in s or "outputs/apk/release" in s):
                  target = p
                  break
          if target is None:
              for p in candidates:
                  s = str(p).lower().replace("\\", "/")
                  if "release" in s:
                      target = p
                      break
          if target is None:
              raise SystemExit("output-metadata.json not found for release")

          data = json.loads(target.read_text(encoding="utf-8"))
          vc = data.get("versionCode")
          vn = data.get("versionName")
          if (vc is None or vn is None) and isinstance(data.get("elements"), list) and data["elements"]:
              elem = data["elements"][0]
              vc = elem.get("versionCode", vc)
              vn = elem.get("versionName", vn)
          if vc is None or vn is None:
              raise SystemExit(f"failed to parse versionName/versionCode from {target}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"version_name={vn}\n")
              f.write(f"version_code={vc}\n")
              f.write(f"expected_tag={vn}-{vc}\n")
          print(f"using metadata: {target}")
          PY

      - name: Commit version.properties back to repo
        if: github.ref_type == 'branch'
        shell: bash
        run: |
          if [ ! -f version.properties ]; then
            echo "version.properties not found, skip commit"
            exit 0
          fi
          if git diff --quiet -- version.properties; then
            echo "version.properties unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git commit -m "ci: update version.properties [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Auto create tag
        id: autotag
        shell: bash
        run: |
          BASE_TAG="${{ steps.version.outputs.expected_tag }}"
          TAG="$BASE_TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG="${BASE_TAG}-r${GITHUB_RUN_NUMBER}"
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG="${BASE_TAG}-r${GITHUB_RUN_NUMBER}-a${GITHUB_RUN_ATTEMPT}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            build/release/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.autotag.outputs.tag }}
          tag_name: ${{ steps.autotag.outputs.tag }}
          body: ${{ steps.commit.outputs.message }}
          files: |
            build/release/*.apk
            app/build/outputs/apk/release/*.apk
