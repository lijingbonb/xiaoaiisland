name: Release Build & Publish

on:
  push:
    branches:
      - "main"
    paths:
      - "app/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare signing files
        shell: bash
        run: |
          mkdir -p build/config build/signing
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > build/signing/release.jks
          cat > build/config/signing.properties <<EOF
          storeFile=${GITHUB_WORKSPACE}/build/signing/release.jks
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          EOF

      - name: Build release APKs
        run: |
          rm -rf build/debug build/release
          ./gradlew --no-daemon clean assembleApi100Release assembleApi101Release

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          NOW="${{ github.sha }}"

          RANGE=""
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            RANGE="$BEFORE..$NOW"
          else
            LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            if [ -n "$LAST_TAG" ]; then
              RANGE="$LAST_TAG..$NOW"
            else
              RANGE="$NOW"
            fi
          fi

          NOTES="$(git log --reverse --pretty='- %h %s (%an)' $RANGE)"
          if [ -z "$NOTES" ]; then
            NOTES="- (no new commits)"
          fi

          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Read release version
        id: version
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          candidates = [
              Path("build/release/output-metadata.json"),
              Path("build/release/api100/output-metadata.json"),
              Path("build/release/api101/output-metadata.json"),
              Path("app/build/outputs/apk/release/output-metadata.json"),
              Path("app/build/outputs/apk/api100/release/output-metadata.json"),
              Path("app/build/outputs/apk/api101/release/output-metadata.json"),
          ]
          existing_candidates = [p for p in candidates if p.exists()]
          if existing_candidates:
              candidates = existing_candidates
          else:
              candidates = list(Path(".").rglob("output-metadata.json"))

          target = None
          for p in candidates:
              s = str(p).lower().replace("\\", "/")
              if "release" in s and ("build/release" in s or "outputs/apk/release" in s):
                  target = p
                  break
          if target is None:
              for p in candidates:
                  s = str(p).lower().replace("\\", "/")
                  if "release" in s:
                      target = p
                      break
          if target is None:
              raise SystemExit("output-metadata.json not found for release")

          data = json.loads(target.read_text(encoding="utf-8"))
          vc = data.get("versionCode")
          vn = data.get("versionName")
          if (vc is None or vn is None) and isinstance(data.get("elements"), list) and data["elements"]:
              elem = data["elements"][0]
              vc = elem.get("versionCode", vc)
              vn = elem.get("versionName", vn)
          if vc is None or vn is None:
              raise SystemExit(f"failed to parse versionName/versionCode from {target}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"version_name={vn}\n")
              f.write(f"version_code={vc}\n")
              f.write(f"expected_tag={vn}-{vc}\n")
          print(f"using metadata: {target}")
          PY

      - name: Auto create tag
        id: autotag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags

          DAY="$(TZ=Asia/Shanghai date +%Y%m%d)"
          LAST_SEQ="$(git tag --list "${DAY}[0-9][0-9]" | sed -E "s/^${DAY}([0-9]{2})$/\\1/" | sort -n | tail -1)"
          if [ -z "$LAST_SEQ" ]; then
            NEXT_SEQ=1
          else
            NEXT_SEQ=$((10#$LAST_SEQ + 1))
          fi
          TAG="$(printf "%s%02d" "$DAY" "$NEXT_SEQ")"

          while git rev-parse "$TAG" >/dev/null 2>&1; do
            NEXT_SEQ=$((NEXT_SEQ + 1))
            TAG="$(printf "%s%02d" "$DAY" "$NEXT_SEQ")"
          done

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Upload release APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: |
            build/release/**/*.apk
            app/build/outputs/apk/**/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.autotag.outputs.tag }}
          tag_name: ${{ steps.autotag.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            build/release/**/*.apk
            app/build/outputs/apk/**/release/*.apk
