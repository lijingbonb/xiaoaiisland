name: CI Debug

on:
  pull_request:
  push:
    branches:
      - "**"
    paths-ignore:
      - "version.properties"

permissions:
  contents: read

concurrency:
  group: ci-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Lint debug
        run: ./gradlew --no-daemon :app:lintDebug
